# =============================================================================
#  HOST nginx vhost — barber.it-services.uz
#  Serverda: /etc/nginx/sites-available/barber.it-services.uz ga nusxalanadi.
#  certbot --nginx keyin 443 blok + http->https redirectni AVTOMATIK qo'shadi.
#
#  BarberShop Docker'da 127.0.0.1:8081 da ishlaydi (Caddy YO'Q — host nginx
#  english/portfolio bilan birga 80/443 ni boshqaradi).
# =============================================================================

server {
    server_name barber.it-services.uz;

    client_max_body_size 10M;   # logo/cover/avatar yuklash uchun

    # Statik fayllar (collectstatic natijasi — bind-mount orqali host'da)
    location /static/ {
        alias /root/Home/Web/BarberShop/staticfiles/;
        access_log off;
        expires 30d;
    }

    # Foydalanuvchi yuklagan media
    location /media/ {
        alias /root/Home/Web/BarberShop/media/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;   # certbot keyin https bo'ladi
        proxy_read_timeout 120s;
    }

    listen 80;
    listen [::]:80;
}
